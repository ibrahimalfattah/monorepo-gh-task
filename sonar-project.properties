# SonarQube project configuration
# The scanner reads this file automatically when run from the repo root.

sonar.projectKey=monorepo-ci-cd
sonar.projectName=Monorepo CI/CD Pipeline
sonar.projectVersion=1.0

# Analyse both services
sonar.sources=src

# Exclude test files from the main source set and add them as test sources
sonar.exclusions=src/**/node_modules/**,src/**/*.test.js
sonar.tests=src
sonar.test.inclusions=src/**/*.test.js

# JavaScript / Node.js analysis
sonar.javascript.lcov.reportPaths=src/backend/coverage/lcov.info
