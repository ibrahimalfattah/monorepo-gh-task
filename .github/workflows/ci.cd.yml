name: Monorepo CI/CD Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# 1. TRIGGERS & MONOREPO PATH FILTERING
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/ci.cd.yml"

  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/ci.cd.yml"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # matches v1.0.0, v2.3.14, etc.

