  # ── 2d. Automated GitHub Release (only on version tags) ──────────────────
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    #needs: simulate_deployment
    # Only execute when the trigger is a version tag (vX.Y.Z)
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository (full history for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          token: ${{ secrets.GH_TOKEN }}
